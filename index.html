<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2 Street | Urban Premium</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #fff;
            --accent: #25D366;
            --bg-dark: #000;
            --card-bg: #111;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: #fff; overflow-x: hidden; }
        body::before { content: ""; position: fixed; inset: 0; background: url('fundo.jpg') center/cover no-repeat; filter: brightness(0.12); z-index: -1; }

        header { background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); padding: 15px 5%; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 1000; }
        
        .header-top { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-bottom: 15px; }
        .header-logo { grid-column: 2; display: flex; justify-content: center; }
        header img { height: 50px; }
        .header-cart { grid-column: 3; display: flex; justify-content: flex-end; }
        
        .search-box { position: relative; width: 100%; max-width: 800px; margin: 0 auto; }
        .search-box input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); padding: 12px 15px 12px 45px; border-radius: 12px; color: #fff; outline: none; font-size: 0.9rem; }
        .search-box::before { content: '🔍'; position: absolute; left: 18px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
        .cart-btn { background: var(--primary); color: #000; border: none; padding: 8px 16px; font-weight: 800; border-radius: 10px; font-size: 0.8rem; cursor: pointer;}

        /* Banner de Destaque CORRIGIDO (Lado a Lado, Sem Bordas) */
        .featured-banner { 
            position: relative; 
            width: 90%; 
            max-width: 1200px; 
            height: 380px; /* Altura equilibrada para o formato retangular */
            margin: 30px auto; 
            border-radius: 25px; 
            overflow: hidden; 
            border: 1px solid #222;
        }
        .banner-track { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .banner-slide { 
            min-width: 100%; 
            height: 100%; 
            display: flex; /* Alinha texto e imagem lado a lado */
            align-items: center;
            background: #000;
        }
        
        /* Texto à Esquerda */
        .banner-info { 
            flex: 1; /* Ocupa metade do banner */
            padding: 0 8%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .banner-info h2 { font-size: 2.2rem; font-weight: 800; text-transform: uppercase; line-height: 1; margin-bottom: 10px; color: #fff; }
        .banner-info p { color: var(--accent); font-size: 1.6rem; font-weight: 800; margin-bottom: 25px; }
        .banner-btn { background: #fff; color: #000; padding: 14px 30px; border-radius: 12px; text-decoration: none; font-weight: 800; display: inline-block; align-self: flex-start; transition: 0.2s; }
        .banner-btn:hover { background: var(--accent); color: #fff; transform: scale(1.05); }

        /* Imagem à Direita (Sem Bordas) */
        .banner-slide img { 
            flex: 1; /* Ocupa a outra metade */
            width: 50%; 
            height: 100%; 
            object-fit: cover; /* Preenche todo o retângulo direito */
            object-position: center top; /* Foca no centro e topo */
            background: #000;
        }

        .banner-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); border: none; color: #fff; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; z-index: 10; font-size: 1.2rem; }
        .banner-arrow:hover { background: #fff; color: #000; }
        .b-left { left: 20px; }
        .b-right { right: 20px; }

        /* Estilo dos Produtos (Cards Retangulares Sem Borda) */
        .product { background: var(--card-bg); border-radius: 20px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; border: 1px solid #222; }
        .grid-scroll .product { min-width: 260px; }
        .product:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.8); }

        .product-img-container { width: 100%; height: 280px; overflow: hidden; }
        .product img { width: 100%; height: 100%; object-fit: cover; } /* Cobre todo o cartão */
        
        .product-details { padding: 18px; flex-grow: 1; display: flex; flex-direction: column; }
        .product h3 { font-size: 0.9rem; height: 42px; margin-bottom: 10px; color: #eee; }
        .price { font-size: 1.4rem; font-weight: 800; margin-bottom: 15px; display: block; color: #fff; }

        /* Filtros e Grids */
        .filters { display: flex; justify-content: center; gap: 15px; padding: 20px 5%; overflow-x: auto; scrollbar-width: none; }
        .filter-btn { text-align: center; cursor: pointer; min-width: 75px; }
        .filter-btn img, .filter-all-icon { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
        .filter-all-icon { display: flex; align-items: center; justify-content: center; background: #fff; color: #000; font-weight: 900; font-size: 0.8rem; margin: 0 auto 10px auto; }
        .filter-btn span { font-size: 0.65rem; text-transform: uppercase; color: #eee; font-weight: 700; display: block; }
        
        .category-row { margin-bottom: 40px; }
        .category-title { font-size: 1.2rem; font-weight: 800; margin: 0 5% 20px 5%; border-left: 4px solid var(--accent); padding-left: 15px; text-transform: uppercase; color: #fff; }
        
        .grid-scroll { display: flex; overflow-x: auto; gap: 20px; padding: 0 5% 30px 5%; scrollbar-width: none; }
        .grid-fixed { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; padding: 0 5%; }

        .size-selector { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
        .size-selector label { background: #1a1a1a; padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; border: 1px solid #333; color: #fff; transition: 0.2s; }
        .size-selector input { display: none; }
        .size-selector input:checked + label { background: #fff; color: #000; font-weight: 800; }

        .actions { display: flex; gap: 8px; margin-top: auto; }
        .actions button { flex: 1; padding: 12px 0; border: none; font-weight: 800; border-radius: 12px; font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
        .add { background: #2a2a2a; color: #fff; }
        .buy { background: #fff; color: #000; }
        .buy:hover { background: var(--accent); color: #fff; }

        .whats-float { position: fixed; bottom: 30px; left: 30px; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 32px; z-index: 1000; box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4); }
        
        .cart { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: #0a0a0a; z-index: 2000; padding: 40px; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); border-left: 1px solid #222; }
        .cart.show { right: 0; }

        @media (max-width: 600px) {
            .featured-banner { height: 450px; }
            .banner-slide { flex-direction: column; text-align: center; }
            .banner-info { order: 2; padding: 20px; align-items: center; max-width: 100%; }
            .banner-info h2 { font-size: 1.6rem; }
            .banner-slide img { order: 1; width: 100%; height: 60%; }
            .banner-btn { align-self: center; }
            .nav-arrow { display: none; }
            .grid-fixed { grid-template-columns: 1fr 1fr; gap: 15px; }
            .grid-scroll .product { min-width: 200px; }
            .category-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="header-logo"><img src="logo.jpg" alt="B2 STREET"></div>
        <div class="header-cart"><button class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></button></div>
    </div>
    <div class="search-box"><input type="text" id="searchInput" placeholder="Buscar na B2 Street..." onkeyup="search()"></div>
</header>

<div class="featured-banner">
    <button class="banner-arrow b-left" onclick="moveBanner(-1)">❮</button>
    <button class="banner-arrow b-right" onclick="moveBanner(1)">❯</button>
    <div class="banner-track" id="bannerTrack">
        <div class="banner-slide">
            <div class="banner-info">
                <h2>Nocta Glide<br>Black</h2>
                <p>R$ 359,90</p>
                <a href="#" class="banner-btn" onclick="buyNowByName('Nike nocta glide')">COMPRAR AGORA</a>
            </div>
            <img src="nocta glide.jpg" alt="Nike Nocta Glide">
        </div>
        <div class="banner-slide">
            <div class="banner-info">
                <h2>Nocta Step 2<br>White</h2>
                <p>R$ 630,00</p>
                <a href="#" class="banner-btn" onclick="buyNowByName('Nike NOCTA Hot Step 2 White')">COMPRAR AGORA</a>
            </div>
            <img src="IMG_9064.JPG" alt="Nike Nocta Hot Step 2">
        </div>
        <div class="banner-slide">
            <div class="banner-info">
                <h2>Syna World<br>Amarelo</h2>
                <p>R$ 129,90</p>
                <a href="#" class="banner-btn" onclick="buyNowByName('conjunto syna amarelo')">COMPRAR AGORA</a>
            </div>
            <img src="conjunto syna amarelo.png" alt="Conjunto Syna Amarelo">
        </div>
    </div>
</div>

<div class="filters">
    <div class="filter-btn" onclick="renderByCategory('tenis')"><img src="tenis.webp"><span>Tênis</span></div>
    <div class="filter-btn" onclick="renderByCategory('roupas')"><img src="roupas.jfif"><span>Roupas</span></div>
    <div class="filter-btn" onclick="renderByCategory('relogios')"><img src="relogios.jfif"><span>Relógios</span></div>
    <div class="filter-btn" onclick="renderAll()"><div class="filter-all-icon">ALL</div><span>Todos</span></div>
</div>

<div id="main-content"></div>

<a href="https://wa.me/5519989620949" class="whats-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

<div class="cart" id="cart">
    <button onclick="toggleCart()" style="background:none; border:none; color:#fff; font-size:1.5rem; float:right; cursor:pointer;">✕ Fechar</button>
    <div id="cartItems" style="margin-top:20px;"></div>
    <div style="margin-top:20px; border-top:1px solid #333; padding-top:20px;">
        <h3 id="cartTotal">Total: R$ 0,00</h3>
        <button onclick="checkout()" style="width:100%; padding:15px; background:var(--accent); color:#fff; font-weight:800; border:none; border-radius:10px; margin-top:15px; cursor:pointer;">Finalizar WhatsApp</button>
    </div>
</div>

<script>
const WHATS = "5519989620949";
// Lista de produtos mantida...
const products = [
    ["IMG_9064.JPG","Nike NOCTA Hot Step 2 White",630.00, "tenis", ""],
    ["air max95 x corteiz.jpg","Air max 95 x Corteiz",349.90, "tenis", ""],
    ["nike DN white.jpg","Nike DN white",354.90, "tenis", ""],
    ["nike-dn-preto.jpg","Nike DN black",354.90, "tenis", ""],
    ["nocta glide.jpg","Nike nocta glide",359.90, "tenis", ""],
    ["nike-air-force.jpg","Nike air force black",249.90, "tenis", ""],
    ["bota timberland.jpg","Bota Timberland",359.90, "tenis", ""],
    ["Asics gel NYC.jpg","Asics gel NYC",449.90, "tenis", ""],
    ["Nike TN.jpg","Nike TN",329.90, "tenis", ""],
    ["calça cargo corteiz 1.jpg","calça cargo corteiz",249.90, "roupas", ""],
    ["calça cargo corteiz 2.jpg","calça cargo corteiz grey",249.90, "roupas", ""],
    ["nike tech flecee branca 2.jpg","nike tech flecee calça branca",325.90, "roupas", ""],
    ["nike tech flecee gray 2.jpg","nike tech flecee calça cinza",325.90, "roupas", ""],
    ["nike tech flecee preta 2.jpg","nike tech flecee calça preta",325.90, "roupas", ""],
    ["syna x nike tech fleece 2.jpg","syna x nike tech fleece calça",329.90, "roupas", ""],
    ["shorts cargo corteiz 1.jpg","shorts cargo corteiz",199.90, "roupas", ""],
    ["shorts cargo corteiz 2.jpg","shorts cargo corteiz green",199.90, "roupas", ""],
    ["shorts cargo corteiz 3.jpg","shorts cargo corteiz blue",199.90, "roupas", ""],
    ["syna shorts 1.jpg","syna shorts pink",284.90, "roupas", ""],
    ["syna shorts 2.jpg","syna shorts black",284.90, "roupas", ""],
    ["shorts corteiz moletom basico.jpg","Shorts Corteiz Moletom Básico",74.90, "roupas", ""],
    ["hellstar 1.jpg","hellstar black tshirt",285.90, "roupas", ""],
    ["hellstar 2.jpg","hellstar white tshirt",285.90, "roupas", ""],
    ["hellstar 3.jpg","hellstar red tshirt",285.90, "roupas", ""],
    ["minus two1.jpg","minus two blue",225.90, "roupas", ""],
    ["minus two 2.jpg","minus two yellow",225.90, "roupas", ""],
    ["minus two 3.jpg","minus two pink",225.90, "roupas", ""],
    ["minus two 4.jpg","minus two red",225.90, "roupas", ""],
    ["nike tech flecee branca 1.jpg","nike tech flecee branca",384.90, "roupas", ""],
    ["nike tech flecee gray 1.jpg","nike tech flecee cinza",384.90, "roupas", ""],
    ["nike tech flecee preta 1.jpg","nike tech flecee preta",384.90, "roupas", ""],
    ["denim tears 1.jpg","denim tears black",269.90, "roupas", ""],
    ["denim tears 2.jpg","denim tears grey",269.90, "roupas", ""],
    ["syna kit1.jpg","syna kit blue",539.90, "roupas", ""],
    ["syna kit2.jpg","syna kit green",539.90, "roupas", ""],
    ["syna x nike tech fleece 1.jpg","syna x nike tech fleece 1",389.90, "roupas", ""],
    ["IMG_9167.jpeg","Regatas Corteiz",94.90, "roupas", ""],
    ["camisa corteiz basica.jpg","Camisa Corteiz Básica",89.90, "roupas", ""],
    ["camisa corteiz brasil.jpg","Camisa Corteiz Brasil",89.90, "roupas", ""],
    ["camisa corteiz oversized.jpg","Camisa Corteiz Oversized",89.90, "roupas", ""],
    ["corteiz rules the world.jpg","Corteiz Rules The World",76.90, "roupas", ""],
    ["conjunto syna amarelo.png","conjunto syna amarelo",129.90, "roupas", ""],
    ["conjunto denim tears preto.jpg","conjunto denim tears preto",119.90, "roupas", ""],
    ["conjunto denim tears cinza.jpg","conjunto denim tears cinza",119.90, "roupas", ""],
    ["moletom nocta.png","moletom nocta",94.90, "roupas", ""],
    ["moletom syna.png","moletom syna",129.90, "roupas", ""],
    ["relogio1.jpg", "Relógio Premium Silver", 199.90, "relogios", ""]
];

let currentSlide = 0;
function moveBanner(dir) {
    const track = document.getElementById("bannerTrack");
    currentSlide = (currentSlide + dir + 3) % 3;
    track.style.transform = `translateX(-${currentSlide * 100}%)`;
}
setInterval(() => moveBanner(1), 7000);

let cart = [];

function createProductCard(p) {
    const originalIdx = products.findIndex(item => item[1] === p[1]);
    const isRelogio = p[3] === 'relogios';
    const sizes = p[3] === 'tenis' ? ['38','39','40','41','42','43','44'] : (p[3] === 'roupas' ? ['P','M','G','GG'] : []);
    
    let sizeHTML = `<div class="size-selector"><span style="font-size:0.7rem; color:#888;">Tam. Único</span></div>`;
    if (sizes.length > 0) {
        sizeHTML = `<div class="size-selector">` + sizes.map(s => `
            <input type="radio" name="sz-${originalIdx}" id="sz-${originalIdx}-${s}" value="${s}">
            <label for="sz-${originalIdx}-${s}">${s}</label>
        `).join('') + `</div>`;
    }

    return `
    <div class="product">
        <div class="product-img-container"><img src="${p[0]}" loading="lazy"></div>
        <div class="product-details">
            <h3>${p[1]}</h3>
            <span class="price">R$ ${p[2].toFixed(2).replace('.',',')}</span>
            ${sizeHTML}
            <div class="actions">
                <button class="add" onclick="addToCart(${originalIdx})">ADD</button>
                <button class="buy" onclick="buyNow(${originalIdx})">BUY</button>
            </div>
        </div>
    </div>`;
}

function renderSection(title, list, isScroll) {
    if (list.length === 0) return;
    const container = document.getElementById("main-content");
    container.innerHTML += `
    <div class="category-row">
        <h2 class="category-title">${title}</h2>
        <div class="${isScroll ? 'grid-scroll' : 'grid-fixed'}">
            ${list.map(p => createProductCard(p)).join('')}
        </div>
    </div>`;
}

function renderAll() {
    const container = document.getElementById("main-content");
    container.innerHTML = "";
    renderSection("Tênis e Calçados", products.filter(p => p[3] === 'tenis'), true);
    renderSection("Roupas Urbanas", products.filter(p => p[3] === 'roupas'), true);
    renderSection("Relógios Premium", products.filter(p => p[3] === 'relogios'), true);
}

function renderByCategory(cat) {
    const container = document.getElementById("main-content");
    container.innerHTML = "";
    renderSection(cat.toUpperCase(), products.filter(p => p[3] === cat), false);
}

function search() {
    const term = document.getElementById("searchInput").value.toLowerCase();
    const filtered = products.filter(p => p[1].toLowerCase().includes(term));
    const container = document.getElementById("main-content");
    container.innerHTML = "";
    renderSection("Busca", filtered, false);
}

function toggleCart() { document.getElementById("cart").classList.toggle("show"); }

function addToCart(i) {
    const radio = document.querySelector(`input[name="sz-${i}"]:checked`);
    const tam = radio ? radio.value : "Único";
    cart.push({ nome: products[i][1], preco: products[i][2], tamanho: tam });
    renderCart();
    toggleCart();
}

function renderCart() {
    const box = document.getElementById("cartItems");
    let total = 0; box.innerHTML = "";
    cart.forEach((item, idx) => {
        total += item.preco;
        box.innerHTML += `<div style="margin-bottom:10px; border-bottom:1px solid #222; padding-bottom:5px;">
            <p style="font-size:0.8rem;">${item.nome} (${item.tamanho})</p>
            <p><b>R$ ${item.preco.toFixed(2)}</b> <span onclick="cart.splice(${idx},1); renderCart();" style="color:red; cursor:pointer; float:right;">Remover</span></p>
        </div>`;
    });
    document.getElementById("count").innerText = cart.length;
    document.getElementById("cartTotal").innerText = `Total: R$ ${total.toFixed(2).replace('.',',')}`;
}

function checkout() {
    if(cart.length === 0) return;
    let msg = "🚀 Pedido B2 Street:%0A";
    cart.forEach(item => msg += `• ${item.nome} (${item.tamanho})%0A`);
    window.open(`https://wa.me/${WHATS}?text=${msg}`, "_blank");
}

function buyNow(i) {
    const radio = document.querySelector(`input[name="sz-${i}"]:checked`);
    const tam = radio ? radio.value : "N/A";
    window.open(`https://wa.me/${WHATS}?text=Quero comprar: ${products[i][1]} (Tam: ${tam})`, "_blank");
}

function buyNowByName(name) {
    const i = products.findIndex(p => p[1] === name);
    if(i !== -1) buyNow(i);
}

renderAll();
</script>
</body>
</html>
