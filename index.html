<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2 STREET | Urban Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #25D366; --bg: #000; --card: #0d0d0d; --gray: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        header { background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); padding: 12px 5%; border-bottom: 1px solid var(--gray); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo-nav { height: 22px; }

        .hero-video { width: 100%; height: 75vh; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
        .hero-video video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .logo-overlay { position: absolute; width: 200px; z-index: 10; filter: drop-shadow(0 0 15px rgba(0,0,0,0.8)); }
        .hero-gradient { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 60%, #000 100%); z-index: 5; }

        .slider-section { padding: 10px 0; background: #000; margin: 20px 0; }
        .slider-container { width: 92%; margin: auto; height: 300px; overflow: hidden; border-radius: 12px; position: relative; }
        .slider-track { display: flex; transition: transform 0.8s ease-in-out; height: 100%; }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .btn-banner { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 25px; border-radius: 50px; font-weight: 800; font-size: 0.7rem; border: none; cursor: pointer; text-transform: uppercase; }

        .container { padding: 25px 4%; }
        .cat-title { font-size: 1rem; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .product-card { background: var(--card); border-radius: 10px; padding: 8px; border: 1px solid #111; cursor: pointer; }
        .img-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 6px; }
        .product-card img { width: 100%; height: 100%; object-fit: cover; }
        .product-card h3 { font-size: 0.75rem; margin: 10px 0 4px; color: #bbb; }
        .product-card .price { font-weight: 800; color: #fff; font-size: 0.9rem; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #000; width: 100%; max-width: 380px; border-radius: 20px; padding: 25px; border: 1px solid #222; position: relative; }
        .cart-sidebar { position: fixed; right: -100%; top: 0; width: 320px; height: 100%; background: #000; z-index: 2000; transition: 0.5s; padding: 30px 20px; border-left: 1px solid var(--gray); display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .btn-action { width: 100%; padding: 14px; margin: 5px 0; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        
        #menu-sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: #000; z-index: 2000; transition: 0.4s; padding: 40px 20px; border-right: 1px solid var(--gray); }
        #menu-sidebar.open { left: 0; }
        .menu-link { display: block; color: #fff; font-weight: 800; margin-bottom: 25px; text-transform: uppercase; cursor: pointer; }

        .checkout-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 0.8rem; }
        .modal-title { font-weight: 800; text-transform: uppercase; margin-bottom: 15px; text-align: center; display: block; }
        .qr-container { text-align: center; padding: 10px; }
        .qr-img { width: 200px; height: 200px; border-radius: 10px; margin: 15px 0; }
    </style>
</head>
<body>

<header>
    <i class="fas fa-bars" onclick="toggleMenu()" style="cursor:pointer"></i>
    <img src="logo.jpg" class="logo-nav">
    <div onclick="toggleCart()" style="position:relative; cursor:pointer">
        <i class="fas fa-shopping-bag"></i>
        <span id="cart-count" style="position:absolute; top:-8px; right:-8px; background:var(--accent); color:#000; font-size:0.6rem; font-weight:800; padding:2px 5px; border-radius:50%">0</span>
    </div>
</header>

<section id="hero-section" class="hero-video">
    <div class="hero-gradient"></div>
    <img src="logo3.png" class="logo-overlay">
    <video autoplay loop muted playsinline>
        <source src="video.mov" type="video/mp4">
    </video>
</section>

<nav id="menu-sidebar">
    <i class="fas fa-times" onclick="toggleMenu()" style="margin-bottom:30px"></i>
    <div class="menu-link" onclick="filterCat('todos')">Todos</div>
    <div class="menu-link" onclick="filterCat('tenis')">Tênis</div>
    <div class="menu-link" onclick="filterCat('camisas')">Camisas</div>
    <div class="menu-link" onclick="filterCat('joias')">Joias</div>
</nav>

<div class="cart-sidebar" id="cart-sidebar">
    <button onclick="toggleCart()" style="background:none; border:1px solid #333; color:#fff; padding:5px 10px; border-radius:50px; margin-bottom:20px">FECHAR</button>
    <div id="cart-list" style="flex:1; overflow-y:auto;"></div>
    <div id="cart-total" style="margin:20px 0; font-weight:800">Total: R$ 0,00</div>
    <button class="btn-action" style="background:#fff; color:#000" onclick="abrirModalDados()">Finalizar pelo Site</button>
    <button class="btn-action" style="background:var(--accent); color:#000" onclick="finalizarWhatsApp()">Finalizar via WhatsApp</button>
</div>

<div id="main-content"></div>

<!-- Modais (Produto, Dados, PIX, Obrigado) -->
<div class="modal-overlay" id="modal-produto">
    <div class="modal-content">
        <img id="m-img" style="width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:10px; margin-bottom:15px">
        <h2 id="m-nome"></h2>
        <p id="m-preco" style="color:var(--accent); font-weight:800; font-size:1.1rem; margin:10px 0"></p>
        <div id="m-sizes" style="display:flex; gap:8px; margin-bottom:20px"></div>
        <button class="btn-action" style="background:#fff" onclick="addAoCarrinho()">Adicionar ao Carrinho</button>
        <button class="btn-action" style="background:var(--accent)" onclick="zapDireto()">WhatsApp</button>
        <p onclick="closeModals()" style="text-align:center; cursor:pointer; margin-top:10px; font-size:0.7rem; color:#555">FECHAR</p>
    </div>
</div>

<div class="modal-overlay" id="modal-dados">
    <div class="modal-content">
        <span class="modal-title">Dados de Entrega</span>
        <input type="text" id="checkout-nome" class="checkout-input" placeholder="Nome Completo">
        <input type="email" id="checkout-email" class="checkout-input" placeholder="E-mail">
        <input type="tel" id="checkout-tel" class="checkout-input" placeholder="Telefone">
        <input type="text" id="checkout-end" class="checkout-input" placeholder="Endereço de Recebimento">
        <button class="btn-action" style="background:#fff; color:#000" onclick="processarPedido()">Fazer Pedido</button>
        <p onclick="closeModals()" style="text-align:center; cursor:pointer; margin-top:10px; font-size:0.7rem; color:#555">CANCELAR</p>
    </div>
</div>

<div class="modal-overlay" id="modal-pix">
    <div class="modal-content qr-container">
        <span class="modal-title">Pagamento PIX</span>
        <div id="pix-valor-display" style="font-weight: 800; color: var(--accent); font-size: 1.2rem;"></div>
        <img src="qrcode.jpg" class="qr-img">
        <p style="font-size: 0.8rem; margin-bottom: 5px;">Chave PIX (Telefone):</p>
        <div style="display: flex; gap: 5px; justify-content: center; align-items: center; margin-bottom: 15px;">
            <span id="chave-pix">5519989620949</span>
            <i class="fas fa-copy" onclick="copiarChave()" style="cursor: pointer; color: var(--accent);"></i>
        </div>
        <button class="btn-action" style="background:var(--accent); color:#000" onclick="confirmarPagamento()">Já Paguei</button>
    </div>
</div>

<div class="modal-overlay" id="modal-obrigado">
    <div class="modal-content" style="text-align: center;">
        <img src="logo.jpg" style="height: 30px; margin-bottom: 20px;">
        <h2 style="font-size: 1.2rem; margin-bottom: 10px;">OBRIGADO PELA COMPRA!</h2>
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 20px;">Seu pedido foi recebido com sucesso e está sendo processado.</p>
        <button class="btn-action" style="background:#fff; color:#000" onclick="location.reload()">Continuar Comprando</button>
        <button class="btn-action" style="background:var(--accent); color:#000" onclick="zapDireto()">Suporte WhatsApp</button>
    </div>
</div>

<script>
// CONFIGURAÇÃO FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyD1Phuyxe5du5aMPG3rn4BxAiKdYp0uFuI",
    authDomain: "b2-street-501f4.firebaseapp.com",
    projectId: "b2-street-501f4",
    storageBucket: "b2-street-501f4.firebasestorage.app",
    messagingSenderId: "975888104452",
    appId: "1:975888104452:web:1d02d83e0155c67a3fc951",
    databaseURL: "https://b2-street-501f4-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let ALL_PRODUCTS = [];
let ALL_BANNERS = [];
let CART = [];
let SELECTED_PROD = null;
let SELECTED_SIZE = null;
let slideIdx = 0;

// BUSCAR DADOS
db.ref('banners').on('value', snap => {
    ALL_BANNERS = [];
    snap.forEach(c => { ALL_BANNERS.push(c.val().url); });
    renderFull();
});

db.ref('produtos').on('value', snap => {
    ALL_PRODUCTS = [];
    snap.forEach(c => { ALL_PRODUCTS.push({id: c.key, ...c.val()}); });
    renderFull();
});

// RENDERIZAÇÃO
function renderFull(filtered = null) {
    const main = document.getElementById('main-content');
    main.innerHTML = "";
    const data = filtered || ALL_PRODUCTS;
    const cats = ["tenis", "camisas", "conjuntos", "shorts", "joias"];

    cats.forEach(cat => {
        let prods = data.filter(p => p.categoria && p.categoria.toLowerCase() === cat);
        if(prods.length > 0) {
            let html = `<div class="container"><h2 class="cat-title">${cat}</h2><div class="grid">`;
            prods.forEach(p => {
                html += `<div class="product-card" onclick="openProduct('${p.id}')">
                            <div class="img-container"><img src="${p.imagem}"></div>
                            <h3>${p.nome}</h3>
                            <span class="price">R$ ${p.preco}</span>
                         </div>`;
            });
            html += `</div></div>`;
            main.innerHTML += html;

            if(cat === "tenis" && ALL_BANNERS.length > 0) {
                let bannerHtml = `
                <div class="slider-section">
                    <div class="slider-container">
                        <div class="slider-track" id="slider-track">
                            ${ALL_BANNERS.map(url => `<div class="slide"><img src="${url}"><button class="btn-banner">Confira Já</button></div>`).join('')}
                        </div>
                    </div>
                </div>`;
                main.innerHTML += bannerHtml;
                startSlide();
            }
        }
    });
}

function startSlide() {
    const track = document.getElementById('slider-track');
    if(!track) return;
    clearInterval(window.slideTimer);
    window.slideTimer = setInterval(() => {
        slideIdx = (slideIdx + 1) % ALL_BANNERS.length;
        track.style.transform = `translateX(-${slideIdx * 100}%)`;
    }, 3000);
}

function openProduct(id) {
    SELECTED_PROD = ALL_PRODUCTS.find(p => p.id === id);
    document.getElementById('m-img').src = SELECTED_PROD.imagem;
    document.getElementById('m-nome').innerText = SELECTED_PROD.nome;
    document.getElementById('m-preco').innerText = `R$ ${SELECTED_PROD.preco}`;
    let isTenis = SELECTED_PROD.categoria.toLowerCase() === 'tenis';
    let sizes = isTenis ? ['39','40','41','42'] : ['P','M','G','GG'];
    document.getElementById('m-sizes').innerHTML = sizes.map(s => 
        `<button onclick="SELECTED_SIZE='${s}'; Array.from(this.parentNode.children).forEach(b=>b.style.border='1px solid #333'); this.style.border='1px solid var(--accent)'" style="padding:8px; background:#111; color:#fff; border:1px solid #333; border-radius:5px; cursor:pointer">${s}</button>`
    ).join('');
    document.getElementById('modal-produto').classList.add('active');
}

function addAoCarrinho() {
    if(!SELECTED_SIZE) return alert("Selecione o tamanho!");
    CART.push({...SELECTED_PROD, tamanho: SELECTED_SIZE});
    updateCart();
    closeModals();
    toggleCart();
    SELECTED_SIZE = null;
}

function updateCart() {
    document.getElementById('cart-count').innerText = CART.length;
    const list = document.getElementById('cart-list');
    let total = 0;
    list.innerHTML = CART.map(i => {
        let p = parseFloat(String(i.preco).replace(',','.'));
        total += p;
        return `<div style="margin-bottom:10px; border-bottom:1px solid #111; padding:5px; font-size:0.8rem;">${i.nome} (${i.tamanho}) - R$ ${i.preco}</div>`;
    }).join('');
    document.getElementById('cart-total').innerText = `Total: R$ ${total.toFixed(2).replace('.',',')}`;
}

// UTILITÁRIOS
function toggleMenu() { document.getElementById('menu-sidebar').classList.toggle('open'); }
function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('open'); }
function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }

function filterCat(c) { 
    toggleMenu(); 
    const hero = document.getElementById('hero-section');
    if(c === 'todos') {
        hero.style.display = 'flex';
        renderFull();
    } else {
        hero.style.display = 'none';
        renderFull(ALL_PRODUCTS.filter(p => p.categoria && p.categoria.toLowerCase() === c)); 
    }
}

function zapDireto() { window.open(`https://wa.me/5519989620949?text=Olá! Gostaria de informações sobre ${SELECTED_PROD ? SELECTED_PROD.nome : 'os produtos'}`); }

function finalizarWhatsApp() {
    if(CART.length === 0) return alert("Seu carrinho está vazio!");
    let texto = "Olá! Gostaria de finalizar meu pedido:%0A%0A";
    CART.forEach(i => texto += `- ${i.nome} (${i.tamanho})%0A`);
    texto += `%0A*${document.getElementById('cart-total').innerText}*`;
    window.open(`https://wa.me/5519989620949?text=${texto}`);
}

function abrirModalDados() {
    if(CART.length === 0) return alert("Seu carrinho está vazio!");
    toggleCart();
    document.getElementById('modal-dados').classList.add('active');
}

function processarPedido() {
    const nome = document.getElementById('checkout-nome').value;
    const email = document.getElementById('checkout-email').value;
    const tel = document.getElementById('checkout-tel').value;
    const end = document.getElementById('checkout-end').value;

    if(!nome || !email || !tel || !end) return alert("Por favor, preencha todos os campos!");

    // URL DO SEU GOOGLE APPS SCRIPT
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzFeAzUqVUWCCJwzPF_0r5rgXJA0Leq6zAqsxyEGDYJiNntiQSqL0LhMygfCgYStoIE/exec'; 

    const dados = {
        nome, email, tel, endereco: end,
        produtos: CART.map(i => `${i.nome} (${i.tamanho})`).join(', '),
        total: document.getElementById('cart-total').innerText
    };

    fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dados)
    });

    document.getElementById('modal-dados').classList.remove('active');
    document.getElementById('pix-valor-display').innerText = document.getElementById('cart-total').innerText;
    document.getElementById('modal-pix').classList.add('active');
}

function copiarChave() {
    navigator.clipboard.writeText("5519989620949");
    alert("Chave PIX copiada!");
}

function confirmarPagamento() {
    document.getElementById('modal-pix').classList.remove('active');
    document.getElementById('modal-obrigado').classList.add('active');
}
</script>
</body>
</html>
