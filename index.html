        .header-logo { grid-column: 2; display: flex; justify-content: center; }
        header img { height: 50px; }
        .header-cart { grid-column: 3; display: flex; justify-content: flex-end; }
        
        .search-box { position: relative; width: 100%; max-width: 800px; margin: 0 auto; }
        .search-box input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); padding: 12px 15px 12px 45px; border-radius: 12px; color: #fff; outline: none; font-size: 0.9rem; }

        /* Banner de Destaque CORRIGIDO (Imagens Inteiras e Nítidas) */
        .featured-banner { 
            position: relative; 
            width: 100%; 
            height: 400px; 
            margin: 0; 
            overflow: hidden; 
            background: radial-gradient(circle at center, #222, #000); /* Fundo para dar profundidade */
        }
        .banner-track { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .banner-slide { 
            min-width: 100%; 
            height: 100%; 
            position: relative; 
            display: flex;
            align-items: center;
            justify-content: center; /* Centraliza a imagem */
            background: transparent;
        }
        /* Imagem centralizada e INTEIRA */
        .banner-slide img { 
            max-width: 90%; 
            max-height: 95%; /* Ocupa quase toda a altura, mas sem tocar nas bordas */
            object-fit: contain; /* GARANTE QUE A IMAGEM NÃO ESTIQUE E FIQUE INTEIRA */
            background: transparent;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.7)); /* Sombra para destacar */
        }
        /* Texto flutuando discretamente sobre a imagem */
        .banner-info { 
            position: absolute;
            bottom: 30px;
            left: 10%;
            max-width: 50%;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9); /* Sombra para leitura */
        }
        .banner-info h2 { font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; color: #fff; line-height: 1.1; letter-spacing: -1.5px; }
        .banner-info p { color: var(--accent); font-weight: 700; font-size: 1.5rem; margin-bottom: 20px; }
        .banner-btn { background: #fff; color: #000; padding: 14px 30px; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 0.85rem; transition: 0.2s; display: inline-block; }
        .banner-btn:hover { background: var(--accent); color: #fff; transform: scale(1.05); }
        
        .banner-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.3); border: none; color: #fff; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; z-index: 10; backdrop-filter: blur(3px); font-size: 1.3rem; }
        .banner-arrow:hover { background: #fff; color: #000; }
        .b-left { left: 20px; }
        .b-right { right: 20px; }

        .filters { display: flex; justify-content: center; gap: 15px; padding: 25px 5%; overflow-x: auto; scrollbar-width: none; background: #000; }
        .filter-btn { flex: 0 0 85px; cursor: pointer; text-align: center; }
        .filter-btn img, .filter-all-icon { width: 65px; height: 65px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.15); margin-bottom: 10px; object-fit: cover; transition: 0.3s; }
        .filter-all-icon { display: flex; align-items: center; justify-content: center; background: #fff; color: #000; font-weight: 900; font-size: 0.8rem; margin: 0 auto 10px auto; }
        .filter-btn span { font-size: 0.65rem; text-transform: uppercase; color: #eee; font-weight: 700; display: block; letter-spacing: 0.5px; }

        .category-row { margin-bottom: 70px; position: relative; }
        .category-title { font-size: 1.3rem; font-weight: 800; margin: 0 5% 30px 5%; border-left: 5px solid var(--accent); padding-left: 18px; text-transform: uppercase; color: #fff; letter-spacing: 1.5px; }
        
        .scroll-wrapper { position: relative; display: flex; align-items: center; }
        .grid-scroll { display: flex; overflow-x: auto; gap: 20px; padding: 0 5% 40px 5%; scrollbar-width: none; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .grid-scroll::-webkit-scrollbar { display: none; }

        .grid-fixed { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 25px; padding: 0 5%; width: 100%; }

        .nav-arrow { position: absolute; top: 40%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; backdrop-filter: blur(5px); font-size: 1.3rem; }
        .nav-arrow:hover { background: #fff; color: #000; transform: scale(1.1); }
        .arrow-left { left: 30px; }
        .arrow-right { right: 30px; }

        /* Card de Produto Manter o visual do Pôster */
        .product { background: var(--card-bg); padding: 0; border-radius: 28px; border: none; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .grid-scroll .product { flex: 0 0 260px; scroll-snap-align: start; }
        .product:hover { transform: translateY(-12px); box-shadow: 0 25px 50px rgba(0,0,0,0.7); }

        .product-img-container { 
            width: 100%; 
            height: 260px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .product img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Mantém o pôster nos produtos */
            background: transparent;
        }

        .product-details { padding: 18px; display: flex; flex-direction: column; flex: 1; }
        .product h3 { font-size: 0.95rem; margin-bottom: 10px; height: 44px; overflow: hidden; color: #eee; line-height: 1.2; font-weight: 600; }
        .price { font-weight: 800; font-size: 1.4rem; margin-bottom: 18px; display: block; color: #fff; }
        
        .size-selector { display: flex; gap: 6px; margin-bottom: 18px; min-height: 38px; align-items: center; }
        .size-selector label { flex: 1; text-align: center; padding: 10px 0; border: 1px solid #333; border-radius: 12px; font-size: 0.7rem; background: #1a1a1a; cursor: pointer; color: #fff; }
        .size-selector input:checked + label { background: #fff; color: #000; font-weight: 800; border-color: #fff; }
        .one-size { font-size: 0.7rem; color: #aaa; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }

        .actions { display: flex; gap: 10px; margin-top: auto; }
        .actions button { flex: 1; padding: 14px 0; border: none; font-weight: 800; border-radius: 14px; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
        .add { background: #2a2a2a; color: #fff; }
        .buy { background: #fff; color: #000; }
        .buy:hover { background: var(--accent); color: #fff; }

            .grid-scroll { padding: 0 3% 30px 3%; }
            .grid-scroll .product { flex: 0 0 210px; }
            .product-img-container { height: 210px; }
            .category-title { margin-left: 3%; }
        }
    </style>
</head>

let currentSlide = 0;
function moveBanner(dir) {
    const track = document.getElementById("bannerTrack");
    currentSlide = (currentSlide + dir + 3) % 3;
    track.style.transform = `translateX(-${currentSlide * 100}%)`;
}
// Auto move banner
setInterval(() => moveBanner(1), 9000); // 9 segundos

let cart = [];

function createProductCard(p) {
    const originalIdx = products.findIndex(item => item[1] === p[1]);
    const isRelogio = p[3] === 'relogios';
    const sizes = p[3] === 'tenis' ? ['38','40','42','44'] : (p[3] === 'roupas' ? ['P','M','G','GG'] : []);
    
    let sizeHTML = `<div class="size-selector"><span class="one-size">Tamanho Único</span></div>`;
    
    if (!isRelogio) {
        sizeHTML = `
        <div class="size-selector">
            ${sizes.map(s => `
                <input type="radio" name="sz-${originalIdx}" id="sz-${originalIdx}-${s}" value="${s}">
                <label for="sz-${originalIdx}-${s}">${s}</label>
            `).join('')}
        </div>`;
    }

    return `
    <div class="product">
        <div class="product-img-container"><img src="${p[0]}" loading="lazy"></div>
        <div class="product-details">
            <h3>${p[1]}</h3>
            <span class="price">R$ ${p[2].toFixed(2).replace('.',',')}</span>
            ${sizeHTML}
            <div class="actions">
                <button class="add" onclick="addToCart(${originalIdx})">ADD</button>
                <button class="buy" onclick="buyNow(${originalIdx})">BUY</button>
            </div>
        </div>
    </div>`;
}

function scrollCat(btn, direction) {
    const grid = btn.parentElement.querySelector('.grid-scroll');
    grid.scrollBy({ left: direction * (window.innerWidth < 600 ? 200 : 400), behavior: 'smooth' });
}

function renderSection(title, list, isScroll) {
    if (list.length === 0) return;
    const container = document.getElementById("main-content");
    container.innerHTML += `
    <div class="category-row">
        <h2 class="category-title">${title}</h2>
        <div class="scroll-wrapper">
            ${isScroll ? `
                <button class="nav-arrow arrow-left" onclick="scrollCat(this, -1)">❮</button>
                <div class="grid-scroll">${list.map(p => createProductCard(p)).join('')}</div>
                <button class="nav-arrow arrow-right" onclick="scrollCat(this, 1)">❯</button>
            ` : `
                <div class="grid-fixed">${list.map(p => createProductCard(p)).join('')}</div>
            `}
        </div>
    </div>`;
}

function renderAll() {
    const container = document.getElementById("main-content");
    container.innerHTML = "";
    renderSection("Tênis", products.filter(p => p[3] === 'tenis'), true);
    const roupas = products.filter(p => p[3] === 'roupas');
    const calcas = roupas.filter(p => p[1].toLowerCase().includes('calça') || p[1].toLowerCase().includes('minus two'));
    const shorts = roupas.filter(p => p[1].toLowerCase().includes('shorts') || p[1].toLowerCase().includes('hellstar'));
    const camisas = roupas.filter(p => !p[1].toLowerCase().includes('calça') && !p[1].toLowerCase().includes('minus two') && !p[1].toLowerCase().includes('shorts') && !p[1].toLowerCase().includes('hellstar'));
    renderSection("Camisas e Conjuntos", camisas, true);
    renderSection("Calças", calcas, true);
    renderSection("Shorts", shorts, true);
    renderSection("Relógios", products.filter(p => p[3] === 'relogios'), true);
}

function renderByCategory(cat) {
    const container = document.getElementById("main-content");
    container.innerHTML = "";
    const filtered = products.filter(p => p[3] === cat);
    if (cat === 'roupas') {
        const calcas = filtered.filter(p => p[1].toLowerCase().includes('calça') || p[1].toLowerCase().includes('minus two'));
        const shorts = filtered.filter(p => p[1].toLowerCase().includes('shorts') || p[1].toLowerCase().includes('hellstar'));
        const camisas = filtered.filter(p => !p[1].toLowerCase().includes('calça') && !p[1].toLowerCase().includes('minus two') && !p[1].toLowerCase().includes('shorts') && !p[1].toLowerCase().includes('hellstar'));
        renderSection("Camisas e Conjuntos", camisas, false);
        renderSection("Calças", calcas, false);
        renderSection("Shorts", shorts, false);
    } else {
        renderSection(cat.toUpperCase(), filtered, false);
    }
}

function search() {
    const term = document.getElementById("searchInput").value.toLowerCase();
    const filtered = products.filter(p => p[1].toLowerCase().includes(term));
    const container = document.getElementById("main-content");
    container.innerHTML = "";
    renderSection(term ? "Resultados para: " + term : "Todos os Produtos", filtered, false);
}

function toggleCart() { document.getElementById("cart").classList.toggle("show"); }

function addToCart(i) {
    const isRelogio = products[i][3] === 'relogios';
    let tam = "Único";
    if (!isRelogio) {
        const radio = document.querySelector(`input[name="sz-${i}"]:checked`);
        if(!radio) { alert("Escolha o tamanho!"); return; }
        tam = radio.value;
    }
    cart.push({ nome: products[i][1], preco: products[i][2], tamanho: tam });
    renderCart();
    toggleCart();
}

function renderCart() {
    const box = document.getElementById("cartItems");
    let total = 0; box.innerHTML = "";
    cart.forEach((item, idx) => {
        total += item.preco;
        box.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid #222; padding-bottom:10px;">
            <div><p style="font-size:0.85rem;"><b>${item.nome}</b></p><small>Tam: ${item.tamanho} | R$ ${item.preco.toFixed(2)}</small></div>
            <button onclick="cart.splice(${idx},1); renderCart();" style="background:none; border:none; color:red; font-weight:800; cursor:pointer;">X</button>
        </div>`;
    });
    document.getElementById("count").innerText = cart.length;
    document.getElementById("cartTotal").innerText = `Total: R$ ${total.toFixed(2).replace('.',',')}`;
}

function checkout() {
    if(cart.length === 0) return;
    let msg = "🚀 *PEDIDO B2 STREET*:%0A";
    cart.forEach(item => msg += `• ${item.nome} (${item.tamanho})%0A`);
    window.open(`https://wa.me/${WHATS}?text=${msg}`, "_blank");
}

function buyNow(i) {
    const isRelogio = products[i][3] === 'relogios';
    let tam = isRelogio ? "Único" : (document.querySelector(`input[name="sz-${i}"]:checked`)?.value || "N/A");
    window.open(`https://wa.me/${WHATS}?text=Quero comprar: ${products[i][1]} (Tam: ${tam})`, "_blank");
}

function buyNowByName(name) {
    const i = products.findIndex(p => p[1] === name);
    if(i !== -1) buyNow(i);
}

renderAll();
</script>
